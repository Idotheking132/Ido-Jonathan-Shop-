<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ניהול — Ido & Jonathan Shop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-content">
            <h1>ניהול</h1>
            <div class="nav-right">
                <button onclick="location.href='/shop'">חנות</button>
                <button onclick="location.href='/auth/logout'">יציאה</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="admin-tabs">
            <button class="tab-btn active" onclick="showTab('products', this)">מוצרים</button>
            <button class="tab-btn" onclick="showTab('purchases', this)">קניות</button>
            <button class="tab-btn" onclick="showTab('tickets', this)">ניהול הזמנות</button>
        </div>

        <!-- Products Tab -->
        <div id="products-tab" class="tab-content active">
            <div class="admin-header">
                <h2>מוצרים</h2>
                <button class="btn-primary" onclick="openProductModal()">+ הוסף מוצר</button>
            </div>

            <div class="products-table">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>שם</th>
                            <th>מחיר</th>
                            <th>מלאי</th>
                            <th>מקס'</th>
                            <th>VIP %</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="products-tbody">
                        <tr><td colspan="7" style="text-align:center; color: var(--text-muted);">טוען...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Purchases Tab -->
        <div id="purchases-tab" class="tab-content">
            <div class="admin-header">
                <h2>היסטוריית קניות</h2>
            </div>
            <div class="products-table">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>קונה</th>
                            <th>מוצר</th>
                            <th>כמות</th>
                            <th>מחיר</th>
                            <th>תאריך</th>
                            <th>טיקט</th>
                        </tr>
                    </thead>
                    <tbody id="purchases-tbody">
                        <tr><td colspan="7" style="text-align:center; color: var(--text-muted);">טוען...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Tickets Tab -->
        <div id="tickets-tab" class="tab-content">
            <div class="admin-header">
                <h2>ניהול הזמנות</h2>
            </div>
            <div class="products-table">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>קונה</th>
                            <th>מוצר</th>
                            <th>כמות</th>
                            <th>מחיר</th>
                            <th>סטטוס</th>
                            <th>פעולות</th>
                        </tr>
                    </thead>
                    <tbody id="tickets-tbody">
                        <tr><td colspan="7" style="text-align:center; color: var(--text-muted);">טוען...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Product Modal -->
    <div id="product-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeProductModal()">&times;</span>
            <h2 id="modal-title">הוסף מוצר</h2>
            <form id="product-form" onsubmit="saveProduct(event)">
                <input type="hidden" id="product-id">

                <div class="form-group">
                    <label>שם המוצר</label>
                    <input type="text" id="product-name" required>
                </div>

                <div class="form-group">
                    <label>תיאור</label>
                    <textarea id="product-description" rows="3"></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>מחיר (₪)</label>
                        <input type="number" id="product-price" step="0.01" min="0" required>
                    </div>
                    <div class="form-group">
                        <label>מלאי</label>
                        <input type="number" id="product-stock" min="0" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>מקסימום לקנייה</label>
                        <input type="number" id="product-max-purchase" min="1" value="1" required>
                    </div>
                    <div class="form-group">
                        <label>הנחת VIP (%)</label>
                        <input type="number" id="product-discount" min="0" max="100" value="0">
                    </div>
                </div>

                <div class="form-group">
                    <label>קישור לתמונה</label>
                    <input type="url" id="product-image" placeholder="https://...">
                </div>

                <div class="modal-actions">
                    <button type="submit" class="btn-primary">שמור</button>
                    <button type="button" class="btn-secondary" onclick="closeProductModal()">ביטול</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let products = [];
        let purchases = [];
        let tickets = [];
        let editingProductId = null;

        async function loadProducts() {
            try {
                const response = await fetch('/api/admin/products');
                products = await response.json();
                displayProducts();
            } catch (error) {
                console.error(error);
            }
        }

        async function loadPurchases() {
            try {
                const response = await fetch('/api/admin/purchases');
                purchases = await response.json();
                displayPurchases();
            } catch (error) {
                console.error(error);
            }
        }

        async function loadTickets() {
            try {
                const response = await fetch('/api/admin/tickets');
                tickets = await response.json();
                displayTickets();
            } catch (error) {
                console.error(error);
            }
        }

        function displayProducts() {
            const tbody = document.getElementById('products-tbody');
            if (products.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; color: var(--text-muted);">אין מוצרים</td></tr>';
                return;
            }
            tbody.innerHTML = products.map(p => `
                <tr>
                    <td>${p.id}</td>
                    <td style="color: var(--text-primary); font-weight: 500;">${p.name}</td>
                    <td>₪${p.price.toFixed(2)}</td>
                    <td>${p.stock}</td>
                    <td>${p.max_purchase}</td>
                    <td>${p.discount_vip}%</td>
                    <td>
                        <button class="btn-small" onclick="editProduct(${p.id})">ערוך</button>
                        <button class="btn-small btn-danger" onclick="deleteProduct(${p.id})">מחק</button>
                    </td>
                </tr>
            `).join('');
        }

        function displayPurchases() {
            const tbody = document.getElementById('purchases-tbody');
            if (purchases.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; color: var(--text-muted);">אין קניות</td></tr>';
                return;
            }
            tbody.innerHTML = purchases.map(p => `
                <tr>
                    <td>${p.id}</td>
                    <td style="color: var(--text-primary);">${p.username}</td>
                    <td>${p.product_name}</td>
                    <td>${p.quantity}</td>
                    <td>₪${p.total_price.toFixed(2)}</td>
                    <td>${new Date(p.purchased_at).toLocaleString('he-IL')}</td>
                    <td>${p.ticket_channel_id ? '✓' : '—'}</td>
                </tr>
            `).join('');
        }

        function displayTickets() {
            const tbody = document.getElementById('tickets-tbody');
            if (tickets.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; color: var(--text-muted);">אין הזמנות</td></tr>';
                return;
            }
            tbody.innerHTML = tickets.map(t => `
                <tr>
                    <td>${t.id}</td>
                    <td style="color: var(--text-primary);">${t.username}</td>
                    <td>${t.product_name}</td>
                    <td>${t.quantity}</td>
                    <td>₪${t.total_price.toFixed(2)}</td>
                    <td>
                        ${t.status === 'pending' ? '<span style="color: #f6ad55;">⏳ בהמתנה</span>' : ''}
                        ${t.status === 'approved' ? '<span style="color: #68d391;">✅ אושר</span>' : ''}
                        ${t.status === 'rejected' ? '<span style="color: #fc8181;">❌ דחוי</span>' : ''}
                        ${t.status === 'closed' ? '<span style="color: #a0aec0;">🔒 סגור</span>' : ''}
                    </td>
                    <td>
                        ${t.status === 'pending' ? `
                            <button class="btn-small" onclick="approveTicket('${t.channel_id}')">אישור</button>
                            <button class="btn-small btn-danger" onclick="rejectTicket('${t.channel_id}')">דחייה</button>
                        ` : ''}
                        <button class="btn-small btn-danger" onclick="closeTicketBtn('${t.channel_id}')">סגור</button>
                    </td>
                </tr>
            `).join('');
        }

        function showTab(tab, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tab + '-tab').classList.add('active');
            btn.classList.add('active');
            if (tab === 'purchases' && purchases.length === 0) loadPurchases();
            if (tab === 'tickets' && tickets.length === 0) loadTickets();
        }

        async function approveTicket(channelId) {
            try {
                const response = await fetch(`/api/admin/tickets/${channelId}/approve`, { method: 'POST' });
                if (response.ok) {
                    alert('✓ הזמנה אושרה');
                    loadTickets();
                } else {
                    alert('❌ שגיאה');
                }
            } catch (error) {
                alert('❌ שגיאה');
            }
        }

        async function rejectTicket(channelId) {
            try {
                const response = await fetch(`/api/admin/tickets/${channelId}/reject`, { method: 'POST' });
                if (response.ok) {
                    alert('✓ הזמנה דחויה');
                    loadTickets();
                } else {
                    alert('❌ שגיאה');
                }
            } catch (error) {
                alert('❌ שגיאה');
            }
        }

        async function closeTicketBtn(channelId) {
            if (!confirm('סגור הזמנה?')) return;
            try {
                const response = await fetch(`/api/admin/tickets/${channelId}/close`, { method: 'POST' });
                if (response.ok) {
                    alert('✓ הזמנה סגורה');
                    loadTickets();
                } else {
                    alert('❌ שגיאה');
                }
            } catch (error) {
                alert('❌ שגיאה');
            }
        }

        function openProductModal(productId = null) {
            editingProductId = productId;
            if (productId) {
                const p = products.find(x => x.id === productId);
                document.getElementById('modal-title').textContent = 'עריכת מוצר';
                document.getElementById('product-id').value = p.id;
                document.getElementById('product-name').value = p.name;
                document.getElementById('product-description').value = p.description || '';
                document.getElementById('product-price').value = p.price;
                document.getElementById('product-stock').value = p.stock;
                document.getElementById('product-max-purchase').value = p.max_purchase;
                document.getElementById('product-discount').value = p.discount_vip;
                document.getElementById('product-image').value = p.image_url || '';
            } else {
                document.getElementById('modal-title').textContent = 'הוסף מוצר';
                document.getElementById('product-form').reset();
                document.getElementById('product-id').value = '';
            }
            document.getElementById('product-modal').style.display = 'block';
        }

        function closeProductModal() {
            document.getElementById('product-modal').style.display = 'none';
            editingProductId = null;
        }

        async function saveProduct(event) {
            event.preventDefault();
            const data = {
                name: document.getElementById('product-name').value,
                description: document.getElementById('product-description').value,
                price: document.getElementById('product-price').value,
                stock: document.getElementById('product-stock').value,
                max_purchase: document.getElementById('product-max-purchase').value,
                discount_vip: document.getElementById('product-discount').value,
                image_url: document.getElementById('product-image').value,
            };

            try {
                const url = editingProductId ? `/api/admin/products/${editingProductId}` : '/api/admin/products';
                const method = editingProductId ? 'PUT' : 'POST';
                const response = await fetch(url, {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    closeProductModal();
                    loadProducts();
                } else {
                    alert('שגיאה בשמירה');
                }
            } catch (error) {
                alert('שגיאה בשמירה');
            }
        }

        function editProduct(id) { openProductModal(id); }

        async function deleteProduct(id) {
            if (!confirm('למחוק את המוצר?')) return;
            try {
                const response = await fetch(`/api/admin/products/${id}`, { method: 'DELETE' });
                if (response.ok) loadProducts();
                else alert('שגיאה במחיקה');
            } catch (error) {
                alert('שגיאה במחיקה');
            }
        }

        window.onclick = function(event) {
            if (event.target == document.getElementById('product-modal')) closeProductModal();
        }

        loadProducts();
    </script>
</body>
</html>

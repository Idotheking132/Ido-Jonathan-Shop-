<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ניהול — Ido & Jonathan Shop</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-container {
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 0;
            min-height: calc(100vh - 60px);
        }

        .admin-sidebar {
            background: var(--bg-secondary);
            border-left: 1px solid var(--border);
            padding: 20px 0;
            position: sticky;
            top: 60px;
            height: calc(100vh - 60px);
            overflow-y: auto;
        }

        .admin-sidebar button {
            width: 100%;
            padding: 15px 20px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            text-align: right;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            border-right: 3px solid transparent;
        }

        .admin-sidebar button:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
        }

        .admin-sidebar button.active {
            background: rgba(88, 101, 242, 0.1);
            color: #5865F2;
            border-right-color: #5865F2;
        }

        .admin-main {
            padding: 30px;
            overflow-y: auto;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .admin-header h2 {
            margin: 0;
            font-size: 24px;
        }

        .products-table {
            background: var(--bg-secondary);
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .products-table table {
            width: 100%;
            border-collapse: collapse;
        }

        .products-table thead {
            background: rgba(88, 101, 242, 0.1);
            border-bottom: 1px solid var(--border);
        }

        .products-table th {
            padding: 15px;
            text-align: right;
            font-weight: 600;
            color: var(--text-primary);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .products-table td {
            padding: 15px;
            border-bottom: 1px solid var(--border);
            color: var(--text-secondary);
        }

        .products-table tbody tr:hover {
            background: rgba(88, 101, 242, 0.05);
        }

        .products-table tbody tr:last-child td {
            border-bottom: none;
        }

        .modal-content {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 30px;
            max-width: 600px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-primary);
            font-size: 14px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 14px;
            transition: all 0.2s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #5865F2;
            box-shadow: 0 0 0 3px rgba(88, 101, 242, 0.1);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 30px;
        }

        .btn-small {
            padding: 8px 12px;
            font-size: 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            background: #5865F2;
            color: white;
            transition: all 0.2s;
        }

        .btn-small:hover {
            background: #4752c4;
        }

        .btn-small.btn-danger {
            background: #dc2626;
        }

        .btn-small.btn-danger:hover {
            background: #b91c1c;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-pending {
            background: rgba(246, 173, 85, 0.2);
            color: #f6ad55;
        }

        .status-approved {
            background: rgba(104, 211, 145, 0.2);
            color: #68d391;
        }

        .status-rejected {
            background: rgba(252, 129, 129, 0.2);
            color: #fc8181;
        }

        .status-closed {
            background: rgba(160, 174, 192, 0.2);
            color: #a0aec0;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        @media (max-width: 768px) {
            .admin-container {
                grid-template-columns: 1fr;
            }

            .admin-sidebar {
                display: flex;
                gap: 0;
                height: auto;
                border-left: none;
                border-bottom: 1px solid var(--border);
                overflow-x: auto;
                position: relative;
                top: 0;
            }

            .admin-sidebar button {
                border-right: none;
                border-bottom: 3px solid transparent;
                white-space: nowrap;
            }

            .admin-sidebar button.active {
                border-right: none;
                border-bottom-color: #5865F2;
            }

            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-content">
            <h1>ניהול</h1>
            <div class="nav-right">
                <button onclick="location.href='/shop'">חנות</button>
                <button onclick="location.href='/auth/logout'">יציאה</button>
            </div>
        </div>
    </nav>

    <div class="admin-container">
        <div class="admin-sidebar">
            <button class="tab-btn active" onclick="showTab('products', this)">📦 מוצרים</button>
            <button class="tab-btn" onclick="showTab('purchases', this)">💳 קניות</button>
            <button class="tab-btn" onclick="showTab('tickets', this)">🎫 הזמנות</button>
        </div>

        <div class="admin-main">
            <!-- Products Tab -->
            <div id="products-tab" class="tab-content active">
                <div class="admin-header">
                    <h2>ניהול מוצרים</h2>
                    <button class="btn-primary" onclick="openProductModal()">+ הוסף מוצר</button>
                </div>

                <div class="products-table">
                    <table>
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>שם</th>
                                <th>מחיר</th>
                                <th>מלאי</th>
                                <th>מקס'</th>
                                <th>VIP %</th>
                                <th>פעולות</th>
                            </tr>
                        </thead>
                        <tbody id="products-tbody">
                            <tr><td colspan="7" style="text-align:center; color: var(--text-muted);">טוען...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Purchases Tab -->
            <div id="purchases-tab" class="tab-content">
                <div class="admin-header">
                    <h2>היסטוריית קניות</h2>
                </div>
                <div class="products-table">
                    <table>
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>קונה</th>
                                <th>מוצר</th>
                                <th>כמות</th>
                                <th>מחיר</th>
                                <th>תאריך</th>
                            </tr>
                        </thead>
                        <tbody id="purchases-tbody">
                            <tr><td colspan="6" style="text-align:center; color: var(--text-muted);">טוען...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Tickets Tab -->
            <div id="tickets-tab" class="tab-content">
                <div class="admin-header">
                    <h2>ניהול הזמנות</h2>
                </div>
                <div class="products-table">
                    <table>
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>קונה</th>
                                <th>מוצר</th>
                                <th>כמות</th>
                                <th>מחיר</th>
                                <th>סטטוס</th>
                                <th>פעולות</th>
                            </tr>
                        </thead>
                        <tbody id="tickets-tbody">
                            <tr><td colspan="7" style="text-align:center; color: var(--text-muted);">טוען...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Product Modal -->
    <div id="product-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeProductModal()">&times;</span>
            <h2 id="modal-title">הוסף מוצר</h2>
            <form id="product-form" onsubmit="saveProduct(event)">
                <input type="hidden" id="product-id">

                <div class="form-group">
                    <label>שם המוצר</label>
                    <input type="text" id="product-name" required>
                </div>

                <div class="form-group">
                    <label>תיאור</label>
                    <textarea id="product-description" rows="3"></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>מחיר (₪)</label>
                        <input type="number" id="product-price" step="0.01" min="0" required>
                    </div>
                    <div class="form-group">
                        <label>מלאי</label>
                        <input type="number" id="product-stock" min="0" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>מקסימום לקנייה</label>
                        <input type="number" id="product-max-purchase" min="1" value="1" required>
                        <small style="color: var(--text-secondary); margin-top: 5px; display: block;">הערה: הכנס -1 לקנייה ללא הגבלה</small>
                    </div>
                    <div class="form-group">
                        <label>הנחת VIP (%)</label>
                        <input type="number" id="product-discount" min="0" max="100" value="0">
                    </div>
                </div>

                <div class="form-group">
                    <label>קישור לתמונה</label>
                    <input type="url" id="product-image" placeholder="https://...">
                </div>

                <div class="modal-actions">
                    <button type="submit" class="btn-primary">שמור</button>
                    <button type="button" class="btn-secondary" onclick="closeProductModal()">ביטול</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let products = [];
        let purchases = [];
        let tickets = [];
        let editingProductId = null;
        let ws = null;

        // WebSocket connection
        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}`);

            ws.onopen = () => {
                console.log('✓ WebSocket connected');
            };

            ws.onmessage = (event) => {
                const { type, data } = JSON.parse(event.data);
                
                if (type === 'product_added' || type === 'product_updated' || type === 'product_deleted') {
                    products = data;
                    displayProducts();
                }
                
                if (type === 'ticket_approved' || type === 'ticket_rejected' || type === 'ticket_closed') {
                    loadTickets();
                }
            };

            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
            };

            ws.onclose = () => {
                console.log('✗ WebSocket disconnected');
                setTimeout(connectWebSocket, 3000);
            };
        }

        async function loadProducts() {
            try {
                const response = await fetch('/api/admin/products');
                products = await response.json();
                displayProducts();
            } catch (error) {
                console.error(error);
            }
        }

        async function loadPurchases() {
            try {
                const response = await fetch('/api/admin/purchases');
                purchases = await response.json();
                displayPurchases();
            } catch (error) {
                console.error(error);
            }
        }

        async function loadTickets() {
            try {
                const response = await fetch('/api/admin/tickets');
                tickets = await response.json();
                displayTickets();
            } catch (error) {
                console.error(error);
            }
        }

        function displayProducts() {
            const tbody = document.getElementById('products-tbody');
            if (products.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; color: var(--text-muted);">אין מוצרים</td></tr>';
                return;
            }
            tbody.innerHTML = products.map(p => `
                <tr>
                    <td><strong>#${p.id}</strong></td>
                    <td style="color: var(--text-primary); font-weight: 500;">${p.name}</td>
                    <td><strong>₪${p.price.toFixed(2)}</strong></td>
                    <td><span style="background: ${p.stock > 0 ? 'rgba(104, 211, 145, 0.2)' : 'rgba(252, 129, 129, 0.2)'}; padding: 4px 8px; border-radius: 4px; color: ${p.stock > 0 ? '#68d391' : '#fc8181'};">${p.stock}</span></td>
                    <td>${p.max_purchase === -1 ? '∞' : p.max_purchase}</td>
                    <td>${p.discount_vip}%</td>
                    <td>
                        <button class="btn-small" onclick="editProduct(${p.id})">ערוך</button>
                        <button class="btn-small btn-danger" onclick="deleteProduct(${p.id})">מחק</button>
                    </td>
                </tr>
            `).join('');
        }

        function displayPurchases() {
            const tbody = document.getElementById('purchases-tbody');
            if (purchases.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; color: var(--text-muted);">אין קניות</td></tr>';
                return;
            }
            tbody.innerHTML = purchases.map(p => `
                <tr>
                    <td><strong>#${p.id}</strong></td>
                    <td style="color: var(--text-primary);">${p.username}</td>
                    <td>${p.product_name}</td>
                    <td>${p.quantity}</td>
                    <td><strong>₪${p.total_price.toFixed(2)}</strong></td>
                    <td>${new Date(p.purchased_at).toLocaleString('he-IL')}</td>
                </tr>
            `).join('');
        }

        function displayTickets() {
            const tbody = document.getElementById('tickets-tbody');
            if (tickets.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; color: var(--text-muted);">אין הזמנות</td></tr>';
                return;
            }
            tbody.innerHTML = tickets.map(t => `
                <tr>
                    <td><strong>#${t.id}</strong></td>
                    <td style="color: var(--text-primary);">${t.username}</td>
                    <td>${t.product_name}</td>
                    <td>${t.quantity}</td>
                    <td><strong>₪${t.total_price.toFixed(2)}</strong></td>
                    <td>
                        <span class="status-badge status-${t.status}">
                            ${t.status === 'pending' ? '⏳ בהמתנה' : ''}
                            ${t.status === 'approved' ? '✅ אושר' : ''}
                            ${t.status === 'rejected' ? '❌ דחוי' : ''}
                            ${t.status === 'closed' ? '🔒 סגור' : ''}
                        </span>
                    </td>
                    <td>
                        ${t.status === 'pending' ? `
                            <button class="btn-small" onclick="approveTicket('${t.channel_id}')">אישור</button>
                            <button class="btn-small btn-danger" onclick="rejectTicket('${t.channel_id}')">דחייה</button>
                        ` : ''}
                        ${t.status !== 'closed' ? `<button class="btn-small btn-danger" onclick="closeTicketBtn('${t.channel_id}')">סגור</button>` : ''}
                    </td>
                </tr>
            `).join('');
        }

        function showTab(tab, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tab + '-tab').classList.add('active');
            btn.classList.add('active');
            if (tab === 'purchases' && purchases.length === 0) loadPurchases();
            if (tab === 'tickets' && tickets.length === 0) loadTickets();
        }

        async function approveTicket(channelId) {
            try {
                const response = await fetch(`/api/admin/tickets/${channelId}/approve`, { method: 'POST' });
                if (response.ok) {
                    alert('✓ הזמנה אושרה');
                    loadTickets();
                } else {
                    alert('❌ שגיאה');
                }
            } catch (error) {
                alert('❌ שגיאה');
            }
        }

        async function rejectTicket(channelId) {
            try {
                const response = await fetch(`/api/admin/tickets/${channelId}/reject`, { method: 'POST' });
                if (response.ok) {
                    alert('✓ הזמנה דחויה');
                    loadTickets();
                } else {
                    alert('❌ שגיאה');
                }
            } catch (error) {
                alert('❌ שגיאה');
            }
        }

        async function closeTicketBtn(channelId) {
            if (!confirm('סגור הזמנה?')) return;
            try {
                const response = await fetch(`/api/admin/tickets/${channelId}/close`, { method: 'POST' });
                if (response.ok) {
                    alert('✓ הזמנה סגורה');
                    loadTickets();
                } else {
                    alert('❌ שגיאה');
                }
            } catch (error) {
                alert('❌ שגיאה');
            }
        }

        function openProductModal(productId = null) {
            editingProductId = productId;
            if (productId) {
                const p = products.find(x => x.id === productId);
                document.getElementById('modal-title').textContent = 'עריכת מוצר';
                document.getElementById('product-id').value = p.id;
                document.getElementById('product-name').value = p.name;
                document.getElementById('product-description').value = p.description || '';
                document.getElementById('product-price').value = p.price;
                document.getElementById('product-stock').value = p.stock;
                document.getElementById('product-max-purchase').value = p.max_purchase;
                document.getElementById('product-discount').value = p.discount_vip;
                document.getElementById('product-image').value = p.image_url || '';
            } else {
                document.getElementById('modal-title').textContent = 'הוסף מוצר';
                document.getElementById('product-form').reset();
                document.getElementById('product-id').value = '';
            }
            document.getElementById('product-modal').style.display = 'block';
        }

        function closeProductModal() {
            document.getElementById('product-modal').style.display = 'none';
            editingProductId = null;
        }

        async function saveProduct(event) {
            event.preventDefault();
            const data = {
                name: document.getElementById('product-name').value,
                description: document.getElementById('product-description').value,
                price: document.getElementById('product-price').value,
                stock: document.getElementById('product-stock').value,
                max_purchase: document.getElementById('product-max-purchase').value,
                discount_vip: document.getElementById('product-discount').value,
                image_url: document.getElementById('product-image').value,
            };

            try {
                const url = editingProductId ? `/api/admin/products/${editingProductId}` : '/api/admin/products';
                const method = editingProductId ? 'PUT' : 'POST';
                const response = await fetch(url, {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    closeProductModal();
                    loadProducts();
                } else {
                    alert('שגיאה בשמירה');
                }
            } catch (error) {
                alert('שגיאה בשמירה');
            }
        }

        function editProduct(id) { openProductModal(id); }

        async function deleteProduct(id) {
            if (!confirm('למחוק את המוצר?')) return;
            try {
                const response = await fetch(`/api/admin/products/${id}`, { method: 'DELETE' });
                if (response.ok) loadProducts();
                else alert('שגיאה במחיקה');
            } catch (error) {
                alert('שגיאה במחיקה');
            }
        }

        window.onclick = function(event) {
            if (event.target == document.getElementById('product-modal')) closeProductModal();
        }

        connectWebSocket();
        loadProducts();
    </script>
</body>
</html>
